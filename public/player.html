<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agence - Joueur</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');

      :root {
        --orange: #e8834a;
        --green: #4caf7d;
        --blue: #3a7bd5;
        --bg: #0f0f1a;
        --bg2: #17172a;
        --card: #23233a;
        --card2: #2b2b47;
        --text: #e8e8f0;
        --text2: #9c9cb6;
        --border: #32324a;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'DM Sans', sans-serif;
        background: radial-gradient(ellipse at top, rgba(58,123,213,0.2), transparent 50%), var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 14px; }
      .logo {
        font-family: 'Bebas Neue', sans-serif;
        color: var(--orange);
        font-size: 50px;
        letter-spacing: 0.08em;
        margin: 0 0 8px;
      }
      .card {
        background: linear-gradient(180deg, var(--card), var(--bg2));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--text2);
      }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      input, button {
        font: inherit;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 11px 12px;
      }
      input { background: #101428; color: var(--text); flex: 1; min-width: 120px; }
      button { border: none; background: var(--orange); color: #fff; font-weight: 700; cursor: pointer; }
      button.secondary { background: var(--card2); color: var(--text2); border: 1px solid var(--border); }
      .hidden { display: none !important; }

      .agency-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 56px;
        line-height: 0.9;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .money {
        font-family: 'Bebas Neue', sans-serif;
        color: var(--green);
        font-size: 52px;
        line-height: 0.95;
      }
      .charges { color: var(--text2); font-size: 22px; margin-top: 4px; }
      .charges b { color: var(--orange); }

      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
      .stat {
        background: rgba(58,123,213,0.08);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }
      .stat.active { border-color: var(--orange); box-shadow: 0 0 22px rgba(232,131,74,0.2) inset; }
      .stat .k { color: var(--text2); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      .stat .v { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; }
      .spec { color: var(--orange); font-size: 12px; font-weight: 700; margin-left: 6px; }

      .cv {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px;
        margin-top: 8px;
        background: rgba(255,255,255,0.02);
      }
      .cv .role { font-weight: 700; }
      .cv .meta { color: var(--text2); font-size: 13px; }
      .cv .bonus { color: var(--green); font-weight: 700; }
      #actions button { width: 100%; margin-top: 8px; text-align: left; }
      #status { color: var(--text2); font-size: 13px; margin: 8px 0 0; }
      .startup-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .startup-col { text-align: center; }
      .startup-head {
        font-size: 9px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }
      .startup-reveal {
        width: 100%;
        min-height: 138px;
        border-radius: 10px;
        cursor: pointer;
        background: repeating-linear-gradient(45deg,var(--card2),var(--card2) 4px,var(--card) 4px,var(--card) 8px);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 4px;
        padding: 8px;
        transition: transform 0.6s ease, background 0.3s, border-color 0.3s, box-shadow 0.3s;
      }
      .startup-reveal.static { cursor: default; }
      .startup-foot { margin-top: 10px; }
      @media (max-width: 760px) {
        .startup-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">AGENCE</div>

      <div id="lobbyCard" class="card">
        <div class="label">Connexion joueur</div>
        <div class="row" style="margin-top:8px">
          <input id="room" maxlength="4" placeholder="Code room (ABCD)" />
          <input id="firstname" placeholder="Prénom" />
          <button id="joinBtn">Rejoindre</button>
        </div>
        <div id="status">Non connecté.</div>
      </div>

      <div id="startupCard" class="card hidden">
        <div class="label">Tirage de départ (secret)</div>
        <h2 id="startupTitle" style="margin:8px 0 10px">En attente...</h2>
        <div id="startupContent" class="startup-grid">
          <div class="startup-col">
            <div class="startup-head">Capital</div>
            <div id="startup-capital-card" class="startup-reveal static">
              <div style="font-size:16px">🎲</div>
              <div class="meta">Lancer le dé</div>
            </div>
            <button id="startupRollBtn" style="margin-top:8px">🎲 Lancer</button>
          </div>
          <div class="startup-col">
            <div class="startup-head">Spécialisation</div>
            <div id="startup-spec-card" class="startup-reveal">
              <div style="font-size:16px">🃏</div>
              <div class="meta">Cliquer</div>
            </div>
          </div>
          <div class="startup-col">
            <div class="startup-head">Top Secret</div>
            <div id="startup-ts-card" class="startup-reveal">
              <div style="font-size:16px">🔒</div>
              <div class="meta">Cliquer</div>
            </div>
          </div>
          <div class="startup-col">
            <div class="startup-head">CVs de départ</div>
            <div id="startup-cvs-card" class="startup-reveal">
              <div style="font-size:16px">👤</div>
              <div class="meta">Cliquer</div>
            </div>
          </div>
        </div>
        <button id="startupReadyBtn" class="hidden startup-foot">C'est parti ! 🚀</button>
      </div>

      <div id="gameCard" class="card hidden">
        <div class="label">Tour en cours</div>
        <div class="agency-title">
          <span style="width:18px;height:18px;border-radius:50%;background:var(--blue);display:inline-block"></span>
          <span id="agencyName">-</span>
        </div>
        <div class="money" id="capital">0€</div>
        <div class="charges">Charges/tour : <b id="charges">0€</b></div>

        <div class="grid" id="forcesGrid"></div>
      </div>

      <div id="actionsCard" class="card hidden">
        <div class="label">Actions</div>
        <div id="actions"></div>
      </div>

      <div id="cvsCard" class="card hidden">
        <div class="label">Tes CVs</div>
        <div id="cvs"></div>
      </div>

      <div id="topSecretCard" class="card hidden">
        <div class="label">Ma carte Top Secret</div>
        <div id="topSecretName" style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--orange);margin-top:6px">-</div>
        <div id="topSecretText" class="meta" style="margin-top:6px"></div>
      </div>
    </div>

    <script>
      const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${wsProtocol}//${window.location.host}`);
      const clientId = crypto.randomUUID();
      const roomFromUrl = new URLSearchParams(window.location.search).get("room");

      const roomInput = document.getElementById("room");
      const firstNameInput = document.getElementById("firstname");
      const joinBtn = document.getElementById("joinBtn");
      const statusEl = document.getElementById("status");
      const lobbyCard = document.getElementById("lobbyCard");
      const startupCard = document.getElementById("startupCard");
      const startupTitle = document.getElementById("startupTitle");
      const startupCapitalCard = document.getElementById("startup-capital-card");
      const startupSpecCard = document.getElementById("startup-spec-card");
      const startupTsCard = document.getElementById("startup-ts-card");
      const startupCvsCard = document.getElementById("startup-cvs-card");
      const startupRollBtn = document.getElementById("startupRollBtn");
      const startupReadyBtn = document.getElementById("startupReadyBtn");
      const gameCard = document.getElementById("gameCard");
      const actionsCard = document.getElementById("actionsCard");
      const cvsCard = document.getElementById("cvsCard");
      const topSecretCard = document.getElementById("topSecretCard");
      const topSecretNameEl = document.getElementById("topSecretName");
      const topSecretTextEl = document.getElementById("topSecretText");
      const agencyNameEl = document.getElementById("agencyName");
      const capitalEl = document.getElementById("capital");
      const chargesEl = document.getElementById("charges");
      const forcesGrid = document.getElementById("forcesGrid");
      const cvsEl = document.getElementById("cvs");
      const actionsEl = document.getElementById("actions");

      const categories = ["Stratégie", "Graphisme", "Conception", "Média", "Développement"];
      roomInput.value = roomFromUrl ? roomFromUrl.toUpperCase() : "";
      let joined = false;
      let lastPrivate = null;

      function fmtEuro(v) {
        return `${Math.round(v / 1000)}k€`;
      }

      function dieSVG(value, size = 52) {
        const v = value || "?";
        return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" aria-label="Dé">
          <rect x="4" y="4" width="56" height="56" rx="10" fill="#fff" stroke="#d6d6e8" stroke-width="3"/>
          <text x="32" y="40" text-anchor="middle" font-size="28" font-family="Bebas Neue, sans-serif" fill="#151525">${v}</text>
        </svg>`;
      }

      function send(payload) {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
      }

      function joinRoom() {
        const roomCode = roomInput.value.trim().toUpperCase();
        const firstName = firstNameInput.value.trim();
        if (roomCode.length !== 4 || !firstName) {
          statusEl.textContent = "Code room + prénom requis.";
          return;
        }
        send({ type: "join_room", roomCode });
        setTimeout(() => send({ type: "player_register", clientId, firstName }), 60);
      }

      function renderStartup(privateState) {
        const startup = privateState.startup || {};
        startupCard.classList.toggle("hidden", !startup.active);
        if (!startup.active) return;

        startupTitle.textContent = startup.isDone ? "Tirage validé" : "Tirage de départ";

        if (startup.rollDone) {
          startupRollBtn.disabled = true;
        }
        startupCapitalCard.innerHTML = startup.startRoll
          ? `<div>${dieSVG(startup.startRoll, 60)}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green)">+${fmtEuro(privateState.capital || 0)}</div>`
          : `<div>${dieSVG(null, 60)}</div><div class="meta">1-2 → 150k€<br>3-4 → 200k€<br>5-6 → 250k€</div>`;

        if (startup.specRevealed) {
          startupSpecCard.classList.add("static");
          startupSpecCard.style.background = "linear-gradient(135deg,var(--card2),var(--card))";
          startupSpecCard.style.borderColor = "var(--orange)";
          startupSpecCard.style.boxShadow = "0 0 12px rgba(232,131,74,0.3)";
          startupSpecCard.innerHTML = `<div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--orange)">${privateState.specialisation?.name || "-"}</div><div style="font-size:24px;font-family:'Bebas Neue',sans-serif;color:var(--green)">+${privateState.specialisation?.bonus || 0}</div><div class="meta">${privateState.specialisation?.category || ""}</div>`;
        }

        if (startup.tsRevealed) {
          startupTsCard.classList.add("static");
          startupTsCard.style.background = "linear-gradient(135deg,rgba(240,192,64,0.12),var(--card))";
          startupTsCard.style.borderColor = "var(--orange)";
          startupTsCard.style.boxShadow = "0 0 10px rgba(240,192,64,0.2)";
          startupTsCard.innerHTML = `<div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--orange)">${privateState.topSecret?.name || "-"}</div><div class="meta" style="line-height:1.3">${privateState.topSecret?.text || ""}</div>`;
        }

        if (startup.cvsRevealed) {
          startupCvsCard.classList.add("static");
          startupCvsCard.style.background = "var(--card2)";
          startupCvsCard.style.borderColor = "var(--border)";
          startupCvsCard.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px;width:100%">${(privateState.hand || []).map((cv) => `<div style="background:var(--bg2);border-radius:6px;padding:4px 6px;text-align:left"><div style="font-size:11px;font-weight:700">${cv.role}</div><div class="meta">+${cv.bonus} ${cv.category}</div><div class="meta">${cv.level} ${cv.contract}</div></div>`).join("")}</div>`;
        }

        startupReadyBtn.classList.toggle("hidden", startup.isDone || !startup.canReady);
        startupReadyBtn.disabled = startup.isDone || !startup.canReady;
        startupTitle.textContent += ` — ${startup.waitingCount || 0}/${startup.totalCount || 0} prêts`;
      }

      function renderGame(privateState) {
        const gameStarted = Boolean(privateState.gameStarted);
        if (!gameStarted) return;

        lobbyCard.classList.add("hidden");
        gameCard.classList.remove("hidden");
        actionsCard.classList.remove("hidden");
        cvsCard.classList.remove("hidden");
        topSecretCard.classList.remove("hidden");

        agencyNameEl.textContent = privateState.playerName || "-";
        capitalEl.textContent = fmtEuro(privateState.capital || 0);
        chargesEl.textContent = fmtEuro(privateState.chargesPerTurn || 0);
        topSecretNameEl.textContent = privateState.topSecret?.name || "-";
        topSecretTextEl.textContent = privateState.topSecret?.text || "Aucune description.";

        const forces = privateState.forcesByCategory || {};
        const currentCategory = privateState.specialisation?.category || "";
        forcesGrid.innerHTML = categories.map((cat) => {
          const isSpec = cat === currentCategory;
          const value = Number(forces[cat] || 0);
          return `
            <div class="stat ${isSpec ? "active" : ""}">
              <div class="k">${cat} ${isSpec ? '<span class="spec">★ SPÉC</span>' : ""}</div>
              <div class="v">+${value}</div>
            </div>
          `;
        }).join("");

        cvsEl.innerHTML = (privateState.cvs || []).map((cv) => `
          <div class="cv">
            <div class="role">${cv.role}</div>
            <div class="meta">${cv.level} · ${cv.contract}</div>
            <div class="meta"><span class="bonus">+${cv.bonus}</span> ${cv.category}</div>
          </div>
        `).join("") || "<div class='meta'>Aucun CV.</div>";

        actionsEl.innerHTML = "";
        const actions = privateState.actions || [];
        if (actions.length === 0) {
          const btn = document.createElement("button");
          btn.className = "secondary";
          btn.disabled = true;
          btn.textContent = `Tour de ${privateState.currentPlayerName || "..."}`;
          actionsEl.appendChild(btn);
        } else {
          actions.forEach((action) => {
            const btn = document.createElement("button");
            btn.textContent = action.label;
            btn.addEventListener("click", () => {
              send({ type: "player_action", clientId, expr: action.expr });
            });
            actionsEl.appendChild(btn);
          });
        }
      }

      joinBtn.addEventListener("click", joinRoom);
      startupSpecCard.addEventListener("click", () => {
        if (lastPrivate?.startup?.specRevealed || lastPrivate?.startup?.isDone) return;
        startupSpecCard.style.transform = "rotateY(90deg)";
        setTimeout(() => {
          startupSpecCard.style.transform = "rotateY(0deg)";
          send({ type: "player_action", clientId, action: "startup_reveal_spec" });
        }, 300);
      });
      startupTsCard.addEventListener("click", () => {
        if (lastPrivate?.startup?.tsRevealed || lastPrivate?.startup?.isDone) return;
        startupTsCard.style.transform = "rotateY(90deg)";
        setTimeout(() => {
          startupTsCard.style.transform = "rotateY(0deg)";
          send({ type: "player_action", clientId, action: "startup_reveal_ts" });
        }, 300);
      });
      startupCvsCard.addEventListener("click", () => {
        if (lastPrivate?.startup?.cvsRevealed || lastPrivate?.startup?.isDone) return;
        send({ type: "player_action", clientId, action: "startup_reveal_cvs" });
      });
      startupRollBtn.addEventListener("click", () => {
        if (lastPrivate?.startup?.rollDone || lastPrivate?.startup?.isDone) return;
        send({ type: "player_action", clientId, action: "startup_roll_die" });
        startupRollBtn.disabled = true;
      });
      startupReadyBtn.addEventListener("click", () => {
        if (!lastPrivate?.startup?.canReady || lastPrivate?.startup?.isDone) return;
        send({ type: "player_action", clientId, action: "startup_ready" });
        startupReadyBtn.disabled = true;
      });

      ws.addEventListener("open", () => {
        statusEl.textContent = "Connecté au serveur.";
      });

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "joined_room") {
          joined = true;
          statusEl.textContent = `Room ${data.roomCode} connectée.`;
          return;
        }
        if (data.type === "error") {
          statusEl.textContent = `Erreur: ${data.message}`;
          return;
        }
        if (data.type !== "relay" || !data.payload) return;
        const payload = data.payload;

        if (payload.type === "lobby_state" && joined && !payload.gameStarted) {
          statusEl.textContent = `Lobby: ${payload.players.length} joueur(s).`;
          return;
        }
        if (payload.type === "startup_roll_result" && payload.targetClientId === clientId) {
          startupRollBtn.disabled = true;
          startupTitle.textContent = `Dé ${payload.roll} → ${fmtEuro(payload.capital)}`;
          return;
        }
        if (payload.type !== "private_state" || payload.targetClientId !== clientId) return;

        lastPrivate = payload;
        renderStartup(payload);
        if (!payload.startup?.active) startupCard.classList.add("hidden");
        renderGame(payload);
      });
    </script>
  </body>
  </html>
