function activateTopSecret() {
  const p = currentPlayer();
  const ts = p.topSecret;
  p.topSecretUsed = true;
  closeModal();

  if (ts.effect === 'levee') {
    rollOnCenter(1, '💸 Levée de fonds', p.name, p.color, ([die]) => {
      const gain = die <= 2 ? 100000 : die <= 4 ? 200000 : 300000;
      p.capital += gain;
      addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> utilise <strong>Levée de fonds</strong> : dé ${die} → <span class="log-amount gain">+${fmt(gain)}</span>`);
      setTimeout(() => {
        showModal('💸 Levée de fonds !', `Dé : ${die}`,
          `<div style="font-size:28px;font-family:'Bebas Neue',sans-serif;color:var(--green)">+${fmt(gain)}</div>`,
          [{label:'Continuer', cls:'btn-primary', fn:'closeModal()'}]);
        if (!checkWin()) render();
      }, 800);
    });
  } else if (ts.effect === 'rumeur') {
    const targets = G.players.filter((pl, i) => i !== p.id && !pl.bankrupt);
    if (targets.length === 0) { render(); return; }
    // Ask who to target first
    showModal(
      '🗞️ Rumeur',
      'Choisissez votre cible :',
      `<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        ${targets.map(t => `
          <button class="btn btn-danger" onclick="activateRumeur(${t.id})" style="justify-content:flex-start;gap:8px">
            <span style="width:10px;height:10px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>
            ${t.name} — ${fmt(t.capital)}
          </button>
        `).join('')}
      </div>`,
      [{label:'Annuler', cls:'btn-secondary', fn:'cancelTopSecret()'}]
    );
  } else if (ts.effect === 'steal_all_cv') {
    const stolen = [];
    G.players.forEach((pl, i) => {
      if (i !== p.id && !pl.bankrupt) {
        stolen.push(...pl.hand);
        pl.hand = [];
      }
    });
    p.hand.push(...stolen);
    addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> utilise <strong>Best place to work</strong> et vole tous les CVs !`);
    render();
  } else if (ts.effect === 'win_ao') {
    addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> utilise <strong>Pot-de-vin</strong> — gagnera le prochain AO automatiquement.`);
    p.potDeBvin = true;
    render();
  } else if (ts.effect === 'plus6_ao') {
    addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> utilise <strong>Le meilleur freelance</strong> — +6 partout au prochain AO.`);
    p.plus6AO = true;
    render();
  } else {
    render();
  }
}

function cancelTopSecret() {
  // Undo used flag and close
  currentPlayer().topSecretUsed = false;
  closeModal();
  render();
}

function activateRumeur(targetId) {
  const p = currentPlayer();
  const target = G.players[targetId];
  rollOnCenter(1, `🗞️ Rumeur vs ${target.name}`, p.name, p.color, ([die]) => {
    const loss = die <= 2 ? 100000 : die <= 4 ? 200000 : 300000;
    target.capital -= loss;
    addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> utilise <strong>Rumeur</strong> contre <span style="color:${target.color}">${target.name}</span> : dé ${die} → <span class="log-amount loss">-${fmt(loss)}</span>`);
    setTimeout(() => {
      showModal('🗞️ Rumeur !', `${target.name} est visé·e`,
        `<div style="text-align:center">
          <div style="font-size:14px;color:var(--text2);margin-bottom:8px">Dé : <strong>${die}</strong></div>
          <div style="font-size:28px;font-family:'Bebas Neue',sans-serif;color:var(--red)">-${fmt(loss)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">Tréso ${target.name} : ${fmt(target.capital)}</div>
        </div>`,
        [{label:'Continuer', cls:'btn-secondary', fn:'closeModal()'}]);
      render();
    }, 800);
  });
}

function flipSpecCard(playerId) {
  if (!G.specCardFlipped) G.specCardFlipped = {};
  G.specCardFlipped[playerId] = !G.specCardFlipped[playerId];
  // Animate only the card element, not full re-render
  const card = document.getElementById(`spec-card-${playerId}`);
  if (card) card.classList.toggle('flipped');
}

function endTurn() {
  nextPlayer();
}

// ══════════════════════════════════════════ MODAL ══

function showModal(title, sub, body, actions) {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-sub').innerHTML = sub;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-actions').innerHTML = actions.map(a =>
    `<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

// ══════════════════════════════════════════ TABS ══

function switchTab(tab) {
  document.querySelectorAll('.side-tab').forEach((el, i) => {
    el.classList.toggle('active', ['action','cards','log'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'cards') renderCardsTab();
  if (tab === 'log') renderLogTab();
}

// ══════════════════════════════════════════ SCREENS ══

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restartGame() {
  showScreen('setup');
}

// ══════════════════════════════════════════ HUB NETWORK ══

const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const hubSocket = new WebSocket(`${wsProtocol}//${window.location.host}`);
const lobbyByClientId = new Map();
const lobbyJoinOrder = [];
let gameStartedFromHub = false;
let latestActionsByPlayerId = new Map();
const startupState = {
  active: false,
  doneByPlayerId: {},
  rollDoneByPlayerId: {},
  specRevealedByPlayerId: {},
  tsRevealedByPlayerId: {},
  cvsRevealedByPlayerId: {}
};

function hubSend(payload) {
  if (hubSocket.readyState === WebSocket.OPEN) hubSocket.send(JSON.stringify(payload));
}

function updateHubRoomUI(data) {
  document.getElementById('hub-room-code').textContent = data.roomCode;
  document.getElementById('hub-qr').src = data.qrDataUrl;
  const linkEl = document.getElementById('hub-join-link');
  linkEl.href = data.joinUrl;
  linkEl.textContent = data.joinUrl;
}

function renderLobbyFromPhones() {
  const players = lobbyJoinOrder.map((clientId) => lobbyByClientId.get(clientId)).filter(Boolean);
  setupPlayers = players.map((p) => ({ firstname: p.firstName, agencyName: generateAgencyName(p.firstName) }));
  renderSetup();

  const status = players.length >= 2
    ? `${players.length} joueurs connectés. Le hub peut lancer la partie.`
    : `Connecte au moins 2 joueurs (${players.length}/2).`;
  document.getElementById('hub-lobby-status').textContent = status;

  hubSend({
    type: 'lobby_state',
    players: players.map((p) => ({ firstName: p.firstName })),
    gameStarted: gameStartedFromHub
  });
}

function updateHubStartupStatus() {
  if (!startupState.active || !G || !Array.isArray(G.players)) return;
  const ready = Object.values(startupState.doneByPlayerId).filter(Boolean).length;
  document.getElementById('hub-lobby-status').textContent = `En attente du tirage des joueurs... ${ready}/${G.players.length} prêts`;
}

function computeForcesByCategory(player) {
  const totals = {};
  (player.hand || []).forEach((cv) => {
    if (!cv || !cv.category) return;
    totals[cv.category] = (totals[cv.category] || 0) + (cv.bonus || 0);
  });
  const spec = player.specialisation;
  if (spec && spec.category) {
    totals[spec.category] = (totals[spec.category] || 0) + (spec.bonus || 0);
  }
  return totals;
}

function extractCurrentActions() {
  const selectors = [
    '#action-area button[onclick]',
    '#modal-actions button[onclick]',
    '#modal-body button[onclick]'
  ];
  const buttons = Array.from(document.querySelectorAll(selectors.join(',')))
    .filter((btn) => btn.offsetParent !== null);
  return buttons.map((btn, idx) => ({
    id: `a-${idx}`,
    label: (btn.textContent || 'Action').trim(),
    expr: btn.getAttribute('onclick')
  }));
}

function sendPlayerAction(playerId, actionData) {
  const clientId = findClientIdByPlayerId(playerId);
  if (!clientId) return;
  hubSend({
    type: 'your_turn',
    targetClientId: clientId,
    actionData
  });
}

function buildPhoneActionsForPlayer(player) {
  if (!G || startupState.active || player.id !== G.currentPlayerIdx) return [];

  if (G.phase === 'roll') {
    return [{ id: 'roll', label: '🎲 Lancer le dé', action: 'roll' }];
  }

  if (G.phase !== 'action') return [];
  const cell = BOARD_CELLS[player.position];
  if (!cell) return [];

  if (cell.type === 'repos') {
    return [{ id: 'rest-end', label: '😴 Fin du tour', expr: 'endTurn()' }];
  }
  if (cell.type === 'depart') {
    return [{ id: 'depart-charges', label: '✅ Payer les charges et continuer', expr: 'payCharges()' }];
  }
  if (cell.type === 'tva-remb') {
    return [{ id: 'refund', label: '💰 Récupérer le pot TVA et continuer', expr: 'getRefund()' }];
  }
  if (cell.type === 'tva') {
    const amount = cell.sub.includes('30') ? 30000 : 50000;
    return [{ id: 'taxes', label: '💸 Payer les taxes et continuer', expr: `payTVA(${amount})` }];
  }
  if (cell.type === 'cv') {
    if (G.currentCV) {
      const c = G.currentCV;
      return [
        { id: 'cv-info', label: `👤 ${c.role} · ${c.level} ${c.contract} · +${c.bonus} ${c.category}`, disabled: true },
        { id: 'cv-recruit', label: '✅ Recruter', expr: 'recruitCV()' },
        { id: 'cv-refuse', label: '❌ Refuser', expr: 'refuseCV()' }
      ];
    }
    return [{ id: 'cv-start', label: '👤 Voir le CV', expr: 'startCV()' }];
  }
  if (cell.type === 'brief') {
    if (G.currentBrief) return [{ id: 'brief-roll', label: '🎲 Lancer le dé Brief', expr: 'rollBriefDie()' }];
    return [{ id: 'brief-start', label: '📩 Tirer la carte Brief', expr: 'startBrief()' }];
  }
  if (cell.type === 'hasard') {
    if (G.currentHasard) return [{ id: 'hasard-continue', label: 'Continuer', expr: 'closeHasard()' }];
    return [{ id: 'hasard-start', label: '🎴 Piocher la carte Hasard', expr: 'startHasard()' }];
  }
  if (cell.type === 'ao' || cell.type === 'ao-a') {
    return [{ id: 'ao-start', label: '📋 Lancer l’AO', expr: 'startAO()' }];
  }

  return [{ id: 'fallback-next', label: 'Continuer', expr: 'endTurn()' }];
}

function findClientIdByPlayerId(playerId) {
  return lobbyJoinOrder.find((clientId) => lobbyByClientId.get(clientId)?.playerId === playerId) || null;
}

function normalizeCV(cv) {
  return {
    role: cv?.role || 'CV',
    category: cv?.category || 'Autre',
    bonus: cv?.bonus || 0,
    contract: cv?.contract || '',
    level: cv?.level || '',
    cost: cv?.cost || 0
  };
}

function syncPhonesWithGame() {
  if (!G || !Array.isArray(G.players) || G.players.length === 0) return;

  const currentPlayerId = G.currentPlayerIdx;
  latestActionsByPlayerId = new Map();

  lobbyJoinOrder.forEach((clientId) => {
    const phone = lobbyByClientId.get(clientId);
    if (!phone || typeof phone.playerId !== 'number') return;
    const player = G.players[phone.playerId];
    if (!player) return;

    const phoneActions = buildPhoneActionsForPlayer(player);
    if (!startupState.active && player.id === currentPlayerId) {
      latestActionsByPlayerId.set(currentPlayerId, phoneActions);
    }
    const privatePayload = {
      type: 'private_state',
      targetClientId: clientId,
      gameStarted: true,
      phase: G.phase,
      startup: {
        active: startupState.active,
        isDone: Boolean(startupState.doneByPlayerId[phone.playerId]),
        rollDone: Boolean(startupState.rollDoneByPlayerId[phone.playerId]),
        specRevealed: Boolean(startupState.specRevealedByPlayerId[phone.playerId]),
        tsRevealed: Boolean(startupState.tsRevealedByPlayerId[phone.playerId]),
        cvsRevealed: Boolean(startupState.cvsRevealedByPlayerId[phone.playerId]),
        canReady: Boolean(
          startupState.rollDoneByPlayerId[phone.playerId]
          && startupState.specRevealedByPlayerId[phone.playerId]
          && startupState.tsRevealedByPlayerId[phone.playerId]
          && startupState.cvsRevealedByPlayerId[phone.playerId]
        ),
        waitingCount: Object.values(startupState.doneByPlayerId).filter(Boolean).length,
        totalCount: G.players.length,
        startRoll: player.startRoll || null
      },
      playerId: player.id,
      playerName: player.name,
      capital: player.capital,
      chargesPerTurn: getCharges(player),
      specialisation: player.specialisation,
      topSecret: player.topSecret,
      cvs: (player.hand || []).map(normalizeCV),
      hand: (player.hand || []).map(normalizeCV),
      forcesByCategory: computeForcesByCategory(player),
      currentPlayerId,
      currentPlayerName: G.players[currentPlayerId]?.name || '',
      actions: phoneActions
    };
    hubSend(privatePayload);

    if (phoneActions.length > 0) {
      sendPlayerAction(player.id, phoneActions[0]);
    }
  });
  updateHubStartupStatus();
}

function completeStartupReady(clientId) {
  if (!startupState.active) return;
  const playerInfo = lobbyByClientId.get(clientId);
  if (!playerInfo) return;
  if (startupState.doneByPlayerId[playerInfo.playerId]) return;
  if (!startupState.rollDoneByPlayerId[playerInfo.playerId]) return;
  if (!startupState.specRevealedByPlayerId[playerInfo.playerId]) return;
  if (!startupState.tsRevealedByPlayerId[playerInfo.playerId]) return;
  if (!startupState.cvsRevealedByPlayerId[playerInfo.playerId]) return;
  startupState.doneByPlayerId[playerInfo.playerId] = true;

  const doneCount = Object.values(startupState.doneByPlayerId).filter(Boolean).length;
  if (doneCount >= G.players.length) {
    rollCapitalForPlayer(G.players.length);
  } else {
    syncPhonesWithGame();
  }
}

function handlePlayerAction(payload) {
  if (payload.action === 'startup_reveal_spec') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || startupState.doneByPlayerId[playerInfo.playerId]) return;
    startupState.specRevealedByPlayerId[playerInfo.playerId] = true;
    syncPhonesWithGame();
    return;
  }

  if (payload.action === 'startup_reveal_ts') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || startupState.doneByPlayerId[playerInfo.playerId]) return;
    startupState.tsRevealedByPlayerId[playerInfo.playerId] = true;
    syncPhonesWithGame();
    return;
  }

  if (payload.action === 'startup_reveal_cvs') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || startupState.doneByPlayerId[playerInfo.playerId]) return;
    startupState.cvsRevealedByPlayerId[playerInfo.playerId] = true;
    syncPhonesWithGame();
    return;
  }

  if (payload.action === 'startup_roll_die') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || startupState.doneByPlayerId[playerInfo.playerId]) return;
    const p = G.players[playerInfo.playerId];
    if (!p) return;
    const roll = rollD6();
    const capital = roll <= 2 ? 150000 : roll <= 4 ? 200000 : 250000;
    p.startRoll = roll;
    p.capital = capital;
    startupState.rollDoneByPlayerId[playerInfo.playerId] = true;
    hubSend({
      type: 'startup_roll_result',
      targetClientId: payload.clientId,
      roll,
      capital
    });
    syncPhonesWithGame();
    return;
  }

  if (payload.action === 'startup_ready') {
    completeStartupReady(payload.clientId);
    return;
  }

  if (payload.action === 'ao_pre_confirmed') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || !G.currentAO) return;
    const player = G.players[playerInfo.playerId];
    if (!player) return;
    const selected = Array.isArray(payload.freelanceIndices) ? payload.freelanceIndices : [];
    G.aoFreelanceOptIn[player.id] = new Set(selected);
    G.aoPreConfirmed[player.id] = true;

    if (payload.useTopSecret && !player.topSecretUsed) {
      const ts = player.topSecret;
      if (ts.effect === 'win_ao' || ts.effect === 'plus6_ao') {
        player.topSecretUsed = true;
        if (ts.effect === 'win_ao') player.potDeBvin = true;
        if (ts.effect === 'plus6_ao') player.plus6AO = true;
      }
    }

    const activePlayers = G.players.filter((p) => !p.bankrupt);
    const confirmed = activePlayers.filter((p) => G.aoPreConfirmed[p.id]).length;
    addLog(`AO pré-phase : ${player.name} confirmé (${confirmed}/${activePlayers.length}).`);
    if (confirmed >= activePlayers.length) {
      runAOCategory();
    } else {
      syncPhonesWithGame();
    }
    return;
  }

  if (payload.action === 'ao_roll') {
    if (!Array.isArray(G.aoRollQueue)) return;
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo) return;
    const remaining = G.aoRollQueue.filter((s) => s.die === null);
    if (!remaining.length) return;
    if (remaining[0].player.id !== playerInfo.playerId) return;
    rollAODie(playerInfo.playerId);
    return;
  }

  if (payload.action === 'ao_winner_continue') {
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || !G.aoAwaitingWinnerContinue) return;
    if (playerInfo.playerId !== G.aoWinnerId) return;
    G.aoAwaitingWinnerContinue = false;
    closeAO();
    return;
  }

  if (payload.action === 'roll') {
    if (!G || !Array.isArray(G.players)) return;
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || typeof playerInfo.playerId !== 'number') return;
    if (playerInfo.playerId !== G.currentPlayerIdx || startupState.active) return;
    if (G.phase !== 'roll') return;
    doRoll();
    return;
  }

  if (payload.action === 'end_turn') {
    if (!G || !Array.isArray(G.players)) return;
    const playerInfo = lobbyByClientId.get(payload.clientId);
    if (!playerInfo || typeof playerInfo.playerId !== 'number') return;
    if (playerInfo.playerId !== G.currentPlayerIdx || startupState.active) return;
    endTurn();
    return;
  }

  if (!G || !Array.isArray(G.players)) return;
  const playerInfo = lobbyByClientId.get(payload.clientId);
  if (!playerInfo || typeof playerInfo.playerId !== 'number') return;
  if (playerInfo.playerId !== G.currentPlayerIdx || startupState.active) return;

  const allowed = latestActionsByPlayerId.get(playerInfo.playerId) || [];
  const chosen = allowed.find((a) => a.expr === payload.expr);
  if (!chosen) return;

  try {
    new Function(chosen.expr)();
  } catch (error) {
    addLog(`⚠️ Action distante invalide: ${error.message}`);
  }
}

function rollCapitalForPlayer(idx) {
  if (idx >= G.players.length) {
    startupState.active = false;
    G.players.forEach((p) => {
      addLog(`<span class="log-player" style="color:${p.color}">${p.name}</span> démarre avec <span class="log-amount gain">${fmt(p.capital)}</span> (dé : ${p.startRoll})`);
    });
    render();
    return;
  }

  startupState.active = true;
  syncPhonesWithGame();
}

hubSocket.addEventListener('open', () => {
  hubSend({ type: 'create_room' });
});

hubSocket.addEventListener('message', (event) => {
  const data = JSON.parse(event.data);
  if (data.type === 'room_created') {
    updateHubRoomUI(data);
    return;
  }
  if (data.type !== 'relay' || !data.payload) return;

  const payload = data.payload;
  if (payload.type === 'player_register') {
    if (!lobbyByClientId.has(payload.clientId)) lobbyJoinOrder.push(payload.clientId);
    lobbyByClientId.set(payload.clientId, {
      clientId: payload.clientId,
      firstName: payload.firstName || `Joueur ${lobbyJoinOrder.length}`,
      playerId: null
    });
    renderLobbyFromPhones();
    return;
  }
  if (payload.type === 'player_action') handlePlayerAction(payload);
});

const _startGame = startGame;
startGame = function startGameFromPhones() {
  const players = lobbyJoinOrder.map((clientId) => lobbyByClientId.get(clientId)).filter(Boolean);
  if (players.length < 2) {
    alert('Il faut au moins 2 joueurs connectés sur téléphone.');
    return;
  }

  setupPlayers = players.map((p) => ({ firstname: p.firstName, agencyName: generateAgencyName(p.firstName) }));
  players.forEach((p, idx) => {
    p.playerId = idx;
    lobbyByClientId.set(p.clientId, p);
  });
  startupState.active = true;
  startupState.doneByPlayerId = {};
  startupState.rollDoneByPlayerId = {};
  startupState.specRevealedByPlayerId = {};
  startupState.tsRevealedByPlayerId = {};
  startupState.cvsRevealedByPlayerId = {};
  gameStartedFromHub = true;
  _startGame();
  syncPhonesWithGame();
};

const _render = render;
render = function renderAndSync() {
  _render();
  syncPhonesWithGame();
};

const _restartGame = restartGame;
restartGame = function restartGameAndLobby() {
  _restartGame();
  gameStartedFromHub = false;
  latestActionsByPlayerId = new Map();
  startupState.active = false;
  startupState.doneByPlayerId = {};
  startupState.rollDoneByPlayerId = {};
  startupState.specRevealedByPlayerId = {};
  startupState.tsRevealedByPlayerId = {};
  startupState.cvsRevealedByPlayerId = {};
  lobbyByClientId.forEach((p) => { p.playerId = null; });
  renderLobbyFromPhones();
};

// ══════════════════════════════════════════ INIT ══

renderSetup();
updateObjective();
</script>
